{% extends 'base.html' %}
{% load i18n %}
{% load static %}
{% load custom_filters %}

{% load static %}
{% block content %}
<!-- Barre de navigation identique à calendar.html -->

<div class="py-12 bg-white dark:bg-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="lg:text-center">
            <h2 class="text-base text-indigo-600 dark:text-indigo-400 font-semibold tracking-wide uppercase">Bienvenue</h2>
            <p class="mt-2 text-3xl leading-8 font-extrabold tracking-tight text-gray-900 dark:text-white sm:text-4xl">
                Gestionnaire de calendrier
            </p>
            <p class="mt-4 max-w-2xl text-xl text-gray-500 dark:text-gray-300 lg:mx-auto">
                Organisez vos événements et rendez-vous en toute simplicité
            </p>
        </div>

        <div class="mt-10">
            <div class="flex justify-center">
                <a href="{% url 'calendar' %}" class="px-6 py-3 border border-transparent text-base font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700">
                    Accéder au calendrier
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
