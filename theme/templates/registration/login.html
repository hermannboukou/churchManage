{% extends "base2.html" %}
{% load i18n %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900">
    <div class="max-w-md w-full space-y-8 p-6 bg-white dark:bg-gray-800 rounded-lg shadow-lg">
        <div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900 dark:text-white">
                Connexion
            </h2>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="p-3 text-sm rounded-lg bg-red-100 text-red-700 dark:bg-red-200">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form class="mt-8 space-y-6" method="POST">
            {% csrf_token %}
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                        Nom d'utilisateur
                    </label>
                    <input id="username" name="username" type="text" required
                           class="appearance-none relative block w-full px-3 py-2 border border-gray-300
                                  dark:border-gray-600 rounded-md focus:outline-none focus:ring-2
                                  focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:text-white">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                        Mot de passe
                    </label>
                    <input id="password" name="password" type="password" required
                           class="appearance-none relative block w-full px-3 py-2 border border-gray-300
                                  dark:border-gray-600 rounded-md focus:outline-none focus:ring-2
                                  focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:text-white">
                </div>
            </div>

            <div>
                <button type="submit"
                        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md
                               shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700
                               focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500
                               dark:bg-blue-700 dark:hover:bg-blue-600">
                    Se connecter
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
