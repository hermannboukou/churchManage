{% extends 'base.html' %}
{% load i18n %}
{% load static %}
{% load custom_filters %}

{% load static %}

{% block content %}
<!-- Barre de navigation identique -->

<div class="py-12 bg-white dark:bg-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="lg:text-center">
            <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white">
                {% trans "Paramètres" %}
            </h2>
        </div>

        <div class="mt-10 space-y-10 md:space-y-0 md:grid md:grid-cols-2 md:gap-x-8 md:gap-y-10">
            <div class="bg-white dark:bg-gray-700 shadow overflow-hidden sm:rounded-lg p-6">
                <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">
                    {% trans "Préférences d'affichage" %}
                </h3>
                <div class="space-y-4">
                    <div class="flex items-center">
                        <input id="dark-mode" type="checkbox" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                        <label for="dark-mode" class="ml-2 block text-sm text-gray-900 dark:text-white">
                            {% trans "Mode sombre" %}
                        </label>
                    </div>
                </div>
            </div>

            <div class="bg-white dark:bg-gray-700 shadow overflow-hidden sm:rounded-lg p-6">
                <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">
                    {% trans "Notifications" %}
                </h3>
                <div class="space-y-4">
                    <div class="flex items-center">
                        <input id="email-notifications" type="checkbox" checked class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                        <label for="email-notifications" class="ml-2 block text-sm text-gray-900 dark:text-white">
                            {% trans "Recevoir les notifications par email" %}
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
