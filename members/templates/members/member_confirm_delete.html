{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-800 dark:text-white mb-4">Supprimer le Membre</h1>
    <div class="bg-white dark:bg-gray-800 shadow-lg rounded-lg p-6">
        <p class="text-gray-800 dark:text-white">Êtes-vous sûr de vouloir supprimer le membre "{{ member.first_name }} {{ member.last_name }}" ?</p>
        <form method="post">
            {% csrf_token %}
            <div class="mt-4">
                <button type="submit" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                    Supprimer
                </button>
                <a href="{% url 'members:member_list' %}" class="ml-4 inline-flex items-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Annuler
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
