{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-800 dark:text-white mb-4">
        {% if object %}
            Modifier le Membre
        {% else %}
            Ajouter un Membre
        {% endif %}
    </h1>
    <div class="bg-white dark:bg-gray-800 shadow-lg rounded-lg p-6">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mt-4">
                <button type="submit" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    {% if object %}
                        Enregistrer les modifications
                    {% else %}
                        Ajouter
                    {% endif %}
                </button>
                <a href="{% url 'members:member_list' %}" class="ml-4 inline-flex items-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Annuler
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
