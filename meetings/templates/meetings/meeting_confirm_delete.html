{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-4">Supprimer la Réunion</h1>

    <div class="bg-white shadow-md rounded-lg p-6">
        <p>Etes-vous sûr de vouloir supprimer la réunion "{{ meeting.name }}" ?</p>
        <form method="post">
            {% csrf_token %}
            <div class="mt-4">
                <button type="submit" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                    Supprimer
                </button>
                <a href="{% url 'meetings:meeting_list' %}" class="ml-4 inline-flex items-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Annuler
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
