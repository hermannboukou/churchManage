{% extends 'base.html' %}
{% load i18n %}
{% load static %}
{% load custom_filters %}

{% block extra_head %}
<style>
    @media print {
        body * {
            visibility: hidden;
        }
        .printable, .printable * {
            visibility: visible;
        }
        .printable {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
        }
        .no-print {
            display: none;
        }
    }
</style>
{% endblock %}

{% block content %}



{% load static i18n %}
<div class="mx-auto max-w-(--breakpoint-2xl) p-4 pb-20 md:p-6 md:pb-6">
    <!-- Breadcrumb Start -->
    <div x-data="{ pageName: `Rapport d'Audiences`}" class="no-print">
        <div class="flex flex-wrap items-center justify-between gap-3 pb-6">
            <h2
                    class="text-xl font-semibold text-gray-800 dark:text-white/90"
                    x-text="pageName"></h2>
            <nav>
                <ol class="flex items-center gap-1.5">
                    <li>
                        <a
                                class="inline-flex items-center gap-1.5 text-sm text-gray-500 dark:text-gray-400"
                                href="{% url 'dashboard' %}"
                        >
                            Home
                            <svg
                                    class="stroke-current"
                                    width="17"
                                    height="16"
                                    viewBox="0 0 17 16"
                                    fill="none"
                                    xmlns="http://www.w3.org/2000/svg"
                            >
                                <path
                                        d="M6.0765 12.667L10.2432 8.50033L6.0765 4.33366"
                                        stroke=""
                                        stroke-width="1.2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                />
                            </svg>
                        </a>
                    </li>

                     <li>
                        <a
                                class="inline-flex items-center gap-1.5 text-sm text-gray-500 dark:text-gray-400"
                                href="{% url 'meetings:audiences_list' %}"
                        >
                            Liste des audiences
                            <svg
                                    class="stroke-current"
                                    width="17"
                                    height="16"
                                    viewBox="0 0 17 16"
                                    fill="none"
                                    xmlns="http://www.w3.org/2000/svg"
                            >
                                <path
                                        d="M6.0765 12.667L10.2432 8.50033L6.0765 4.33366"
                                        stroke=""
                                        stroke-width="1.2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                />
                            </svg>
                        </a>
                    </li>
                    <li
                            class="text-sm text-gray-800 dark:text-white/90"
                            x-text="pageName"
                    ></li>
                </ol>
            </nav>
        </div>
    </div>
  <!-- Breadcrumb End -->

<div class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200">
    <div class="container mx-auto px-4 py-8">
<!-- Formulaire de filtrage -->
<form method="get" class="mb-6 flex flex-wrap gap-4 items-end bg-white dark:bg-gray-800 p-4 rounded shadow no-print">
<!-- Année -->
    <div>
        <label class="block text-sm font-medium text-gray-700">{% trans "Année" %}</label>
        <select name="year" class="mt-1 block w-full rounded border-gray-300" onchange="submitForm()">
            {% for year in years %}
            <option value="{{ year }}" {% if selected_year == year %}selected{% endif %}>
                {{ year }}
            </option>
            {% endfor %}
        </select>
    </div>
    <div>
        <label for="meeting_type" class="block text-sm font-medium text-gray-700">Type de réunion</label>
        <select name="meeting_type" id="meeting_type" class="mt-1 block w-full rounded border-gray-300">
            <option value="">Tous</option>
            {% for mt in meeting_types %}
                <option value="{{ mt.id }}" {% if mt.id == selected_meeting_type %}selected{% endif %}>{{ mt.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div>
        <label for="church" class="block text-sm font-medium text-gray-700">Église</label>
        <select name="church" id="church" class="mt-1 block w-full rounded border-gray-300">
            {% for church in churches %}
                <option value="{{ church.id }}" {% if church.id == selected_church %}selected{% endif %}>{{ church.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div>
        <button type="submit" class="inline-flex items-center px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Filtrer</button>
    </div>
        <div>
        <a href="{% url 'meetings:audience_report' %}" type="button" class="inline-flex items-center px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">Retour</a>
    </div>
</form>

        <!-- Graphique Chart.js -->
        <div class="mt-8 rounded-2xl border dark:border-gray-800 dark:border-gray-600 mt-4 px-3 py-2 sm:px-5 sm:py-4">
            <canvas id="audienceChart"></canvas>
        </div>


    </div>
</div>


{% endblock %}
{% block extra_js %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Soumission automatique du formulaire au changement
            const form = document.querySelector('form[method="get"]');
            if (form) {
                const selects = form.querySelectorAll('select');
                selects.forEach(select => {
                    select.addEventListener('change', function() {
                        form.submit();
                    });
                });
            }
            // Affichage du graphique
            const ctx = document.getElementById('audienceChart').getContext('2d');
            const chartData = JSON.parse('{{ chart_data|escapejs }}');
            new Chart(ctx, {
                type: 'bar',
                data: chartData,
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'top' },
                        title: { display: true, text: 'Fréquence des audiences par mois' }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    },
                    // Augmenter l'épaisseur des barres
                    datasets: {
                        bar: {
                            barThickness: 40, // Ajuste l'épaisseur ici (20-50 recommandé)
                            maxBarThickness: 60
                        }
                    }
                }
            });
        });
    </script>
{% endblock %}
